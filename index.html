<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Beat the Drop</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1120">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html, body { height:100%; overflow:hidden; background:#0f1120; font-family:'Segoe UI', system-ui, sans-serif; }
  #game { position:relative; width:100%; height:100%; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }

  #hud {
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
    padding: max(12px, env(safe-area-inset-top)) 16px 0 16px;
    color:#fff; font-weight:700; pointer-events:none;
    text-shadow: 0 2px 6px rgba(0,0,0,.5);
  }
  #hud .score { font-size: 22px; }
  #hud .combo { font-size: 14px; color:#ffd166; }
  #hud .lives { font-size: 18px; letter-spacing: 2px; }
  #hud .cat { position:absolute; top:52px; left:16px; font-size:11px; color:#8a8ec2; font-weight:600; text-transform:uppercase; letter-spacing:1px; }

  #zones {
    position:absolute; left:0; right:0; bottom:0;
    display:flex; height:22%;
  }
  .zone {
    flex:1; display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size: clamp(18px, 5vw, 28px);
    color:#fff; letter-spacing:1px; position:relative; overflow:hidden;
    transition: filter .08s ease;
  }
  .zone.left { background: linear-gradient(180deg, rgba(239,71,111,0), rgba(239,71,111,.35)); border-top:2px solid rgba(239,71,111,.6); }
  .zone.right { background: linear-gradient(180deg, rgba(6,214,160,0), rgba(6,214,160,.35)); border-top:2px solid rgba(6,214,160,.6); }
  .zone.flash-correct { filter: brightness(1.9); box-shadow: inset 0 0 40px 10px rgba(6,214,160,.8); }
  .zone.flash-wrong { filter: brightness(1.3); box-shadow: inset 0 0 40px 10px rgba(239,71,111,.9); }
  .zone.hint { box-shadow: inset 0 0 0 4px #ffd166; }

  #line {
    position:absolute; left:0; right:0; height:2px;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,.6) 0 10px, transparent 10px 20px);
  }

  #banner {
    position:absolute; top:38%; left:50%; transform:translate(-50%,-50%) scale(.7);
    font-size:34px; font-weight:900; opacity:0; pointer-events:none;
    text-shadow: 0 3px 10px rgba(0,0,0,.5);
    transition: opacity .12s ease, transform .12s ease;
  }
  #banner.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
  #banner.correct { color:#06d6a0; }
  #banner.wrong { color:#ef476f; }

  #overlay {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    color:#fff; background:rgba(15,17,32,.95); padding:24px; gap:12px;
    overflow-y:auto;
  }
  #overlay h1 { font-size: 28px; }
  #overlay p { color:#bcbcd8; max-width:320px; line-height:1.5; font-size:14px; }
  #overlay .big { font-size:40px; font-weight:800; color:#ffd166; }
  button { background:#5b6bff; color:#fff; border:none; border-radius:14px;
    padding:14px 28px; font-size:17px; font-weight:700; cursor:pointer;
    box-shadow: 0 6px 0 #3c47c9; }
  button:active { transform: translateY(4px); box-shadow: 0 2px 0 #3c47c9; }
  .hidden { display:none !important; }

  #catGrid { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:360px; margin-bottom:6px; }
  .catBtn {
    background:#1c1e3a; box-shadow:none; border:2px solid #33366b;
    border-radius:14px; padding:12px 16px; font-size:14px; font-weight:700;
    color:#e4e4ff; min-width:130px;
  }
  .catBtn.selected { border-color:#ffd166; background:#2a2c56; }
  .catBtn .n { display:block; font-size:11px; font-weight:500; color:#8a8ec2; margin-top:2px; }

  #reviewList { list-style:none; width:100%; max-width:380px; max-height:44vh; overflow-y:auto; margin:4px 0; text-align:left; }
  #reviewList li {
    display:flex; align-items:center; gap:10px; padding:9px 10px; margin-bottom:6px;
    background:#1c1e3a; border-radius:10px; border-left:4px solid #ef476f; font-size:13px;
  }
  #reviewList li .ico { font-size:18px; flex-shrink:0; }
  #reviewList .txt { flex:1; }
  #reviewList .txt .item-label { color:#fff; display:block; margin-bottom:2px; }
  #reviewList .txt .item-meta { color:#8a8ec2; font-size:11px; }
  #reviewList .txt .item-meta b { color:#06d6a0; }
  #reviewEmpty { color:#8a8ec2; font-size:13px; margin:10px 0; }
  .btnRow { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .secondary { background:#33366b; box-shadow:0 6px 0 #21234a; }
  .secondary:active { box-shadow:0 2px 0 #21234a; }

  .shake { animation: shakeAnim .3s; }
  @keyframes shakeAnim {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
</style>
</head>
<body>
<div id="game">
  <canvas id="canvas"></canvas>
  <div id="line"></div>
  <div id="banner"></div>
  <div id="hud">
    <div class="score">0</div>
    <div class="combo"></div>
    <div class="lives">♥♥♥</div>
    <div class="cat" id="catLabel"></div>
  </div>
  <div id="zones">
    <div class="zone left" id="zoneLeft">FALSO</div>
    <div class="zone right" id="zoneRight">VERDADERO</div>
  </div>
  <div id="overlay">
    <h1 id="ovTitle">Beat the Drop</h1>
    <p id="ovDesc">Clasifica cada frase antes de que cruce la línea.<br>
    Toca <b style="color:#ef476f">izquierda</b> si es <b>FALSO</b>,
    <b style="color:#06d6a0">derecha</b> si es <b>VERDADERO</b>.</p>
    <div id="catGrid"></div>
    <div class="big" id="highScoreDisplay">0</div>
    <p style="margin-top:-8px" id="hsLabel">Récord</p>
    <div class="btnRow">
      <button id="startBtn">Jugar</button>
      <button id="reviewBtn" class="secondary hidden">Ver revisión</button>
    </div>
  </div>

  <div id="reviewOverlay" class="hidden" style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; text-align:center; color:#fff; background:rgba(15,17,32,.97); padding:20px; gap:8px; overflow-y:auto;">
    <h1 style="font-size:22px; margin-top:10px;">Revisión de fallos</h1>
    <p id="reviewEmpty" class="hidden">¡No fallaste ninguna! 🎉</p>
    <ul id="reviewList"></ul>
    <button id="reviewBackBtn" class="secondary" style="margin-top:8px;">Volver</button>
  </div>
</div>

<script>
/* =========================================================
   CONTENIDO POR CATEGORÍAS
   correct:true  -> respuesta correcta = zona DERECHA (Verdadero)
   correct:false -> respuesta correcta = zona IZQUIERDA (Falso)
   Agrega tantas categorías y frases como quieras aquí.
   ========================================================= */
const CATEGORIES = {
  "Gramática": [
    { text: "She go to school every day.", correct: false },
    { text: "She goes to school every day.", correct: true },
    { text: "They was playing football.", correct: false },
    { text: "They were playing football.", correct: true },
    { text: "I have eaten breakfast already.", correct: true },
    { text: "I have ate breakfast already.", correct: false },
    { text: "The cat is on the table.", correct: true },
    { text: "The cat are on the table.", correct: false },
    { text: "He don't like coffee.", correct: false },
    { text: "He doesn't like coffee.", correct: true },
    { text: "We are going to the beach tomorrow.", correct: true },
    { text: "We is going to the beach tomorrow.", correct: false },
    { text: "There is many books on the shelf.", correct: false },
    { text: "There are many books on the shelf.", correct: true },
    { text: "My sister more tall than me.", correct: false },
    { text: "My sister is taller than me.", correct: true },
  ],
  "Vocabulario": [
    { text: "'Happy' means the same as 'sad'.", correct: false },
    { text: "'Big' means the same as 'large'.", correct: true },
    { text: "A 'doctor' works in a hospital.", correct: true },
    { text: "A 'baker' fixes cars.", correct: false },
    { text: "'Fast' is the opposite of 'slow'.", correct: true },
    { text: "'Cold' is the opposite of 'wet'.", correct: false },
    { text: "A 'library' is a place to borrow books.", correct: true },
    { text: "A 'kitchen' is used to sleep.", correct: false },
    { text: "'Beautiful' and 'ugly' mean the same.", correct: false },
    { text: "An 'umbrella' protects you from rain.", correct: true },
  ],
  "Plantas Medicinales": [
    { text: "El limoncillo se usa como tranquilizante natural.", correct: true },
    { text: "La sábila no sirve para quemaduras.", correct: false },
    { text: "El jengibre puede ayudar con las náuseas.", correct: true },
    { text: "La menta no tiene propiedades digestivas.", correct: false },
    { text: "El orégano tiene propiedades antibacterianas.", correct: true },
    { text: "La manzanilla se usa para el insomnio y la ansiedad.", correct: true },
    { text: "El eucalipto no ayuda con la congestión nasal.", correct: false },
    { text: "La albahaca solo se usa como planta ornamental.", correct: false },
  ],
  "Trivia General": [
    { text: "Panamá está en América del Sur.", correct: false },
    { text: "El Canal de Panamá conecta el Pacífico y el Atlántico.", correct: true },
    { text: "El sol es una estrella.", correct: true },
    { text: "El agua hierve a 0°C al nivel del mar.", correct: false },
    { text: "Los delfines son mamíferos.", correct: true },
    { text: "Panamá usa el euro como moneda oficial.", correct: false },
  ],
  /* Categoría de EMOJIS: usa "emoji" en vez de (o junto a) "text".
     Si un item trae "emoji", el juego dibuja el emoji grande y
     usa "text" solo como leyenda pequeña opcional debajo. */
  "¿Es una fruta?": [
    { emoji: "🍎", text: "Manzana", correct: true },
    { emoji: "🚗", text: "Carro", correct: false },
    { emoji: "🍌", text: "Banana", correct: true },
    { emoji: "🪑", text: "Silla", correct: false },
    { emoji: "🍇", text: "Uvas", correct: true },
    { emoji: "📱", text: "Celular", correct: false },
    { emoji: "🍍", text: "Piña", correct: true },
    { emoji: "🐶", text: "Perro", correct: false },
    { emoji: "🍓", text: "Fresa", correct: true },
    { emoji: "✏️", text: "Lápiz", correct: false },
    { emoji: "🥭", text: "Mango", correct: true },
    { emoji: "⚽", text: "Balón", correct: false },
  ],
};

/* =========================================================
   MOTOR DEL JUEGO
   ========================================================= */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const gameEl = document.getElementById('game');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreEl = document.querySelector('#hud .score');
const comboEl = document.querySelector('#hud .combo');
const livesEl = document.querySelector('#hud .lives');
const catLabelEl = document.getElementById('catLabel');
const highScoreDisplay = document.getElementById('highScoreDisplay');
const hsLabel = document.getElementById('hsLabel');
const ovTitle = document.getElementById('ovTitle');
const ovDesc = document.getElementById('ovDesc');
const catGrid = document.getElementById('catGrid');
const zoneLeft = document.getElementById('zoneLeft');
const zoneRight = document.getElementById('zoneRight');
const lineEl = document.getElementById('line');
const bannerEl = document.getElementById('banner');
const reviewBtn = document.getElementById('reviewBtn');
const reviewOverlay = document.getElementById('reviewOverlay');
const reviewList = document.getElementById('reviewList');
const reviewEmpty = document.getElementById('reviewEmpty');
const reviewBackBtn = document.getElementById('reviewBackBtn');

let W, H, lineY, zonesTop;
function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  zonesTop = window.innerHeight * 0.78;
  lineY = zonesTop;
  lineEl.style.top = lineY + 'px';
}
window.addEventListener('resize', resize);
resize();

// ---- Puntuaciones altas por categoría ----
function hsKey(cat) { return 'beatdrop_highscore_' + cat; }
function getHighScore(cat) { return parseInt(localStorage.getItem(hsKey(cat)) || '0', 10); }
function setHighScore(cat, v) { localStorage.setItem(hsKey(cat), v); }

// ---- Selección de categoría ----
const catNames = Object.keys(CATEGORIES);
let selectedCategory = catNames[0];

function buildCatGrid() {
  catGrid.innerHTML = '';
  catNames.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'catBtn' + (name === selectedCategory ? ' selected' : '');
    btn.innerHTML = `${name}<span class="n">${CATEGORIES[name].length} frases · récord ${getHighScore(name)}</span>`;
    btn.addEventListener('click', () => {
      selectedCategory = name;
      buildCatGrid();
      highScoreDisplay.textContent = getHighScore(selectedCategory);
    });
    catGrid.appendChild(btn);
  });
}
buildCatGrid();
highScoreDisplay.textContent = getHighScore(selectedCategory);

let state = 'idle'; // idle | playing | over
let score, combo, lives, speed, current, deck, mistakes;

function shuffledDeck(cat) {
  const d = [...CATEGORIES[cat]];
  for (let i = d.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [d[i], d[j]] = [d[j], d[i]];
  }
  return d;
}

function nextItem() {
  if (!deck.length) deck = shuffledDeck(selectedCategory);
  const data = deck.pop();
  return { ...data, y: -40, x: window.innerWidth / 2, resolved: false };
}

function resetGame() {
  score = 0; combo = 0; lives = 3; speed = 70;
  deck = shuffledDeck(selectedCategory);
  mistakes = [];
  current = nextItem();
  catLabelEl.textContent = selectedCategory;
  updateHUD();
}

function itemLabel(item) {
  return item.emoji ? `${item.emoji}${item.text ? ' ' + item.text : ''}` : item.text;
}

function updateHUD() {
  scoreEl.textContent = score;
  comboEl.textContent = combo > 1 ? `x${combo} combo` : '';
  livesEl.textContent = '♥'.repeat(Math.max(lives,0)) + '♡'.repeat(3-Math.max(lives,0));
}

function beep(freq, dur, type='sine') {
  try {
    const actx = beep._ctx || (beep._ctx = new (window.AudioContext||window.webkitAudioContext)());
    const o = actx.createOscillator(); const g = actx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = 0.08;
    o.connect(g); g.connect(actx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.stop(actx.currentTime + dur);
  } catch(e) {}
}
function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

function flashZone(el, good) {
  el.classList.add(good ? 'flash-correct' : 'flash-wrong');
  setTimeout(() => el.classList.remove(good ? 'flash-correct' : 'flash-wrong'), 220);
}
function hintZone(el) {
  el.classList.add('hint');
  setTimeout(() => el.classList.remove('hint'), 500);
}
function showBanner(text, good) {
  bannerEl.textContent = text;
  bannerEl.className = good ? 'correct' : 'wrong';
  requestAnimationFrame(() => bannerEl.classList.add('show'));
  setTimeout(() => bannerEl.classList.remove('show'), 420);
}
function shakeScreen() {
  gameEl.classList.remove('shake'); void gameEl.offsetWidth;
  gameEl.classList.add('shake');
}

// Popups de puntaje flotantes en canvas
let popups = [];
function addPopup(text, color) {
  popups.push({ text, color, x: window.innerWidth/2, y: zonesTop - 40, life: 1 });
}

function judge(choiceIsTrue) {
  if (state !== 'playing' || current.resolved) return;
  current.resolved = true;
  const correct = (choiceIsTrue === current.correct);
  const chosenZone = choiceIsTrue ? zoneRight : zoneLeft;
  const trueZone = current.correct ? zoneRight : zoneLeft;

  if (correct) {
    combo++;
    const gained = 10 * Math.max(1, Math.min(combo, 8));
    score += gained;
    beep(660 + combo*20, 0.12);
    vibrate(15);
    flashZone(chosenZone, true);
    showBanner('✅ CORRECTO', true);
    addPopup('+' + gained, '#06d6a0');
    if (score > 0 && score % 100 < gained) speed += 14;
  } else {
    combo = 0;
    lives--;
    beep(140, 0.25, 'sawtooth');
    vibrate([30,40,30]);
    flashZone(chosenZone, false);
    hintZone(trueZone);
    showBanner('❌ INCORRECTO', false);
    shakeScreen();
    mistakes.push({ item: current, chosen: choiceIsTrue });
    if (lives <= 0) { updateHUD(); return endGame(); }
  }
  updateHUD();
  current = nextItem();
}

function endGame() {
  state = 'over';
  const prevHS = getHighScore(selectedCategory);
  let isNewRecord = false;
  if (score > prevHS) { setHighScore(selectedCategory, score); isNewRecord = true; }
  buildCatGrid();
  highScoreDisplay.textContent = getHighScore(selectedCategory);
  ovTitle.textContent = 'Game Over';
  ovDesc.innerHTML = `Puntaje: <b style="color:#fff">${score}</b> en <b style="color:#ffd166">${selectedCategory}</b>` + (isNewRecord ? '<br><b style="color:#06d6a0">¡Nuevo récord!</b>' : '');
  startBtn.textContent = 'Jugar de nuevo';
  reviewBtn.classList.toggle('hidden', mistakes.length === 0);
  reviewBtn.textContent = `Ver revisión (${mistakes.length})`;
  overlay.classList.remove('hidden');
}

function buildReviewScreen() {
  reviewList.innerHTML = '';
  if (mistakes.length === 0) {
    reviewEmpty.classList.remove('hidden');
    return;
  }
  reviewEmpty.classList.add('hidden');
  mistakes.forEach(m => {
    const li = document.createElement('li');
    const correctLabel = m.item.correct ? 'VERDADERO' : 'FALSO';
    const chosenLabel = m.chosen === null ? 'no respondiste' : (m.chosen ? 'VERDADERO' : 'FALSO');
    li.innerHTML = `
      <span class="ico">❌</span>
      <span class="txt">
        <span class="item-label">${itemLabel(m.item)}</span>
        <span class="item-meta">Correcto: <b>${correctLabel}</b> · Tu respuesta: ${chosenLabel}</span>
      </span>`;
    reviewList.appendChild(li);
  });
}

reviewBtn.addEventListener('click', () => {
  buildReviewScreen();
  overlay.classList.add('hidden');
  reviewOverlay.classList.remove('hidden');
});
reviewBackBtn.addEventListener('click', () => {
  reviewOverlay.classList.add('hidden');
  overlay.classList.remove('hidden');
});

let lastTime = 0;
function loop(t) {
  const dt = Math.min(0.05, (t - lastTime) / 1000 || 0);
  lastTime = t;
  ctx.clearRect(0, 0, W, H);

  if (state === 'playing') {
    current.y += speed * dt * devicePixelRatio;
    if (!current.resolved && current.y / devicePixelRatio > zonesTop + 30) {
      current.resolved = true;
      combo = 0; lives--;
      beep(120, 0.25, 'sawtooth'); vibrate(40);
      showBanner('⏱️ SE ESCAPÓ', false);
      shakeScreen();
      mistakes.push({ item: current, chosen: null });
      updateHUD();
      if (lives <= 0) { endGame(); }
      else current = nextItem();
    }
    drawItem(current);
  }

  // dibujar popups de puntaje
  popups.forEach(p => {
    p.life -= dt * 1.4;
    p.y -= 40 * dt * devicePixelRatio;
  });
  popups = popups.filter(p => p.life > 0);
  popups.forEach(p => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.font = `800 ${26*devicePixelRatio}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x*devicePixelRatio, p.y);
    ctx.restore();
  });

  requestAnimationFrame(loop);
}

function drawItem(item) {
  if (item.emoji) return drawEmojiItem(item);

  const x = item.x * devicePixelRatio;
  const y = item.y;
  const fontSize = 20 * devicePixelRatio;
  ctx.font = `700 ${fontSize}px 'Segoe UI', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const paddingX = 18 * devicePixelRatio;
  const metrics = ctx.measureText(item.text);
  const boxW = Math.min(W - 20*devicePixelRatio, metrics.width + paddingX*2);
  const boxH = fontSize * 2;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.4)';
  ctx.shadowBlur = 10 * devicePixelRatio;
  ctx.fillStyle = '#1c1e3a';
  roundRect(ctx, x - boxW/2, y - boxH/2, boxW, boxH, 14*devicePixelRatio);
  ctx.fill();
  ctx.restore();

  ctx.fillStyle = '#fff';
  wrapText(ctx, item.text, x, y, boxW - paddingX*1.4, fontSize*1.15);
}

function drawEmojiItem(item) {
  const x = item.x * devicePixelRatio;
  const y = item.y;
  const circleR = 44 * devicePixelRatio;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.4)';
  ctx.shadowBlur = 10 * devicePixelRatio;
  ctx.fillStyle = '#1c1e3a';
  ctx.beginPath();
  ctx.arc(x, y, circleR, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  ctx.font = `${56*devicePixelRatio}px 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(item.emoji, x, y + 2*devicePixelRatio);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function wrapText(ctx, text, cx, cy, maxWidth, lineHeight) {
  const words = text.split(' ');
  let lines = [], line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = w; }
    else line = test;
  }
  lines.push(line);
  const startY = cy - (lines.length-1)*lineHeight/2;
  lines.forEach((l, i) => ctx.fillText(l, cx, startY + i*lineHeight));
}

zoneLeft.addEventListener('pointerdown', e => { e.preventDefault(); judge(false); });
zoneRight.addEventListener('pointerdown', e => { e.preventDefault(); judge(true); });

startBtn.addEventListener('click', () => {
  overlay.classList.add('hidden');
  ovTitle.textContent = 'Beat the Drop';
  ovDesc.innerHTML = 'Clasifica cada frase antes de que cruce la línea.<br>Toca <b style="color:#ef476f">izquierda</b> si es <b>FALSO</b>, <b style="color:#06d6a0">derecha</b> si es <b>VERDADERO</b>.';
  resetGame();
  state = 'playing';
});

requestAnimationFrame(loop);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
